name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev-v3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Bot + Dashboard via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            # Load nvm nếu có
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Đảm bảo npm global tools available
            export PATH="$HOME/.nvm/versions/node/$(node -v)/bin:$PATH:$(npm config get prefix)/bin"

            APP_DIR="$HOME/Arya-Bot-Ver-3"

            # Clone nếu chưa có, pull nếu đã có
            if [ ! -d "$APP_DIR" ]; then
              echo "📥 Cloning repo..."
              git clone https://github.com/KhoaDayy/Arya-Bot-Ver-3.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "══════════════════════════════════════════"
            echo "  📥 Pulling latest code..."
            echo "══════════════════════════════════════════"
            git pull origin dev-v3

            echo ""
            echo "══════════════════════════════════════════"
            echo "  📦 Installing Bot dependencies..."
            echo "══════════════════════════════════════════"
            npm install

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🔧 Installing global tools (pnpm, pm2)..."
            echo "══════════════════════════════════════════"
            which pnpm || npm install -g pnpm
            which pm2 || npm install -g pm2

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🎨 Building Dashboard..."
            echo "══════════════════════════════════════════"
            cd "$APP_DIR/dashboard"
            pnpm install --frozen-lockfile || pnpm install
            pnpm build
            cd "$APP_DIR"

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🔄 Restarting Bot (PM2)..."
            echo "══════════════════════════════════════════"
            pm2 restart arya-bot-v3 || pm2 start index.js --name "arya-bot-v3"

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🌐 Restarting Dashboard (PM2)..."
            echo "══════════════════════════════════════════"
            pm2 restart arya-dashboard || (cd "$APP_DIR/dashboard" && pm2 start "pnpm start" --name "arya-dashboard")

            pm2 save
            echo ""
            echo "✅ Deploy completed!"
