name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev-v3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Bot + Dashboard via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            APP_DIR="$HOME/Arya-Bot-Ver-3"

            # Clone nếu chưa có
            if [ ! -d "$APP_DIR" ]; then
              echo "📥 Cloning repo..."
              git clone https://github.com/KhoaDayy/Arya-Bot-Ver-3.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "══════════════════════════════════════════"
            echo "  📥 Pulling latest code..."
            echo "══════════════════════════════════════════"
            git pull origin dev-v3

            echo ""
            echo "══════════════════════════════════════════"
            echo "  📦 Installing Bot dependencies..."
            echo "══════════════════════════════════════════"
            npm install

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🔧 Installing global tools..."
            echo "══════════════════════════════════════════"
            which pnpm || sudo npm install -g pnpm
            which pm2  || sudo npm install -g pm2

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🎨 Building Dashboard..."
            echo "══════════════════════════════════════════"
            # Tạo swap nếu chưa có (EC2 ít RAM)
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 1G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo "Swap 1G created"
            fi
            cd "$APP_DIR/dashboard"
            pnpm install --frozen-lockfile || pnpm install
            NODE_OPTIONS="--max-old-space-size=1024" pnpm build
            cd "$APP_DIR"

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🔄 Restarting Bot (PM2)..."
            echo "══════════════════════════════════════════"
            pm2 restart arya-bot-v3 || pm2 start index.js --name "arya-bot-v3"

            echo ""
            echo "══════════════════════════════════════════"
            echo "  🌐 Restarting Dashboard (PM2)..."
            echo "══════════════════════════════════════════"
            pm2 restart arya-dashboard || (cd "$APP_DIR/dashboard" && pm2 start "pnpm start" --name "arya-dashboard")

            pm2 save
            echo ""
            echo "✅ Deploy completed!"
