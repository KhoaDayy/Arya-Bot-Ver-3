name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev-v3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Dashboard on GitHub Runner (Fast)
        run: |
          npm install -g pnpm
          cd dashboard
          pnpm install
          pnpm build
          # Nén mục build lại để dễ dàng chuyển sang VPS
          tar -czf ../dashboard-build.tar.gz .next/

      - name: Transfer Build to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          source: "dashboard-build.tar.gz"
          target: "/tmp/"

      - name: Update Code and Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            APP_DIR="$HOME/Arya-Bot-Ver-3"

            # 1. Update source code (không build)
            if [ ! -d "$APP_DIR" ]; then
              echo "📥 Cloning repo..."
              git clone https://github.com/KhoaDayy/Arya-Bot-Ver-3.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "══════════════════════════════════════════"
            echo "  📥 Pulling latest code..."
            git fetch origin dev-v3
            git reset --hard origin/dev-v3

            # 2. Xử lý Dashboard Build Transfer
            echo "══════════════════════════════════════════"
            echo "  📦 Extracting pre-built Dashboard..."
            cd "$APP_DIR/dashboard"
            rm -rf .next
            # Giải nén cục build tải từ GitHub runner
            tar -xzf /tmp/dashboard-build.tar.gz -C "$APP_DIR/dashboard"
            rm -f /tmp/dashboard-build.tar.gz

            # Cài đặt công cụ nền
            which pnpm || sudo npm install -g pnpm
            which pm2  || sudo npm install -g pm2

            # Chỉ cài prod dependencies trên VPS để chạy
            pnpm install --prod

            # 3. Handle Bot
            echo "══════════════════════════════════════════"
            echo "  📦 Installing Bot dependencies..."
            cd "$APP_DIR"
            npm install

            # 4. Restart everything
            echo "══════════════════════════════════════════"
            echo "  🔄 Restarting PM2..."
            pm2 restart arya-bot-v3 || pm2 start index.js --name "arya-bot-v3"
            pm2 restart arya-dashboard || (cd "$APP_DIR/dashboard" && pm2 start "pnpm start" --name "arya-dashboard")

            pm2 save
            echo ""
            echo "🚀 FAST DEPLOY COMPLETED! VPS didn't have to build!"
